<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Creevey Test Page</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #1e1e1e;
        color: #d4d4d4;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .header {
        background: #252526;
        padding: 16px 24px;
        border-bottom: 1px solid #3c3c3c;
      }
      .header h1 { color: #fff; font-size: 18px; }
      .content {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px;
      }
      .card {
        background: #2d2d2d;
        border-radius: 8px;
        padding: 24px;
        max-width: 500px;
        width: 100%;
      }
      .card h2 { color: #fff; margin-bottom: 16px; font-size: 16px; }
      .status {
        display: flex;
        gap: 16px;
        margin-bottom: 16px;
      }
      .status-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
      }
      .status-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
      }
      .status-dot.success { background: #4caf50; }
      .status-dot.failed { background: #f44336; }
      .status-dot.pending { background: #ff9800; }
      .test-list {
        background: #252526;
        border-radius: 4px;
        padding: 8px;
        max-height: 200px;
        overflow-y: auto;
      }
      .test-item {
        padding: 8px 12px;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        cursor: pointer;
      }
      .test-item:hover { background: #37373d; }
      .test-item.selected { background: #094771; }
      .approve-btn {
        width: 100%;
        margin-top: 16px;
        padding: 12px;
        background: #4caf50;
        border: none;
        border-radius: 4px;
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      .approve-btn:hover { background: #45a049; }
      .approve-btn:disabled {
        background: #5a5a5a;
        cursor: not-allowed;
      }
      .screenshot-container {
        margin-top: 16px;
        border-radius: 4px;
        overflow: hidden;
        background: #000;
      }
      .screenshot-container img {
        width: 100%;
        display: block;
      }
      .empty-screenshot {
        padding: 40px;
        text-align: center;
        color: #808080;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>Creevey Reporter</h1>
    </div>
    <div class="content">
      <div class="card">
        <h2>Test Results</h2>
        <div class="status">
          <div class="status-item">
            <span class="status-dot success"></span>
            <span>5 Passed</span>
          </div>
          <div class="status-item">
            <span class="status-dot failed"></span>
            <span>2 Failed</span>
          </div>
          <div class="status-item">
            <span class="status-dot pending"></span>
            <span>1 Pending</span>
          </div>
        </div>
        <div class="test-list" id="test-list">
          <div class="test-item" data-test="homepage">
            <span class="status-dot success"></span>
            Homepage - renders correctly
          </div>
          <div class="test-item" data-test="login">
            <span class="status-dot success"></span>
            Login Form - renders correctly
          </div>
          <div class="test-item" data-test="dashboard">
            <span class="status-dot failed"></span>
            Dashboard - shows stats
          </div>
        </div>
        <div class="screenshot-container" id="screenshot-container">
          <div class="empty-screenshot">Select a test to view screenshot</div>
        </div>
        <button class="approve-btn" id="approve-btn">Approve Selected</button>
      </div>
    </div>
    <script type="module">
      const testList = document.getElementById('test-list');
      const screenshotContainer = document.getElementById('screenshot-container');
      const approveBtn = document.getElementById('approve-btn');
      
      const screenshots = {
        'homepage': '/screenshots/test-page.png',
        'login': null,
        'dashboard': null,
      };
      
      let selectedTest = null;
      
      testList.addEventListener('click', (e) => {
        const item = e.target.closest('.test-item');
        if (!item) return;
        
        document.querySelectorAll('.test-item').forEach(el => el.classList.remove('selected'));
        item.classList.add('selected');
        
        selectedTest = item.dataset.test;
        const screenshotPath = screenshots[selectedTest];
        
        if (screenshotPath) {
          screenshotContainer.innerHTML = `<img src="${screenshotPath}" alt="${selectedTest}" />`;
        } else {
          screenshotContainer.innerHTML = '<div class="empty-screenshot">No screenshot available</div>';
        }
      });
      
      approveBtn.addEventListener('click', () => {
        if (selectedTest) {
          alert(`Approved: ${selectedTest}`);
        }
      });
    </script>
  </body>
</html>
